name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Show Next.js config
        run: |
          echo "=== Next.js Configuration ==="
          cat next.config.ts
          echo ""
          echo "=== Package.json scripts ==="
          cat package.json | grep -A 5 '"scripts"'

      - name: Build with Next.js
        run: |
          echo "Starting Next.js build..."
          echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}"
          npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Create out directory and export
        run: |
          echo "=== Checking for out directory ==="
          if [ ! -d "out" ]; then
            echo "out directory not found, creating manually..."
            mkdir -p out/_next
            
            echo "Copying static files..."
            if [ -d ".next/static" ]; then
              cp -r .next/static/* out/_next/
              echo "✓ Copied .next/static"
            fi
            
            echo "Copying server-rendered pages..."
            if [ -d ".next/server/app" ]; then
              find .next/server/app -name "*.html" -exec sh -c 'cp "$1" "out/$(basename "$1")"' _ {} \;
              echo "✓ Copied HTML files"
            fi
            
            echo "Copying public files..."
            if [ -d "public" ]; then
              cp -r public/* out/
              echo "✓ Copied public files"
            fi
            
            echo ""
            echo "=== Manual export completed ==="
            echo "Contents of out directory:"
            ls -la out/
          else
            echo "✓ out directory already exists"
            ls -la out/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

