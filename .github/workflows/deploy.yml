name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Export static files
        run: |
          echo "Creating out directory structure..."
          mkdir -p out/_next/static
          
          # Copy static assets
          if [ -d ".next/static" ]; then
            cp -r .next/static/* out/_next/static/
          fi
          
          # Copy public files
          if [ -d "public" ]; then
            cp -r public/* out/
          fi
          
          # Find and copy all HTML files from server directory
          if [ -d ".next/server" ]; then
            find .next/server -name "*.html" -type f | while read file; do
              filename=$(basename "$file")
              cp "$file" "out/$filename"
            done
          fi
          
          # Create index.html if it doesn't exist
          if [ ! -f "out/index.html" ] && [ -f ".next/server/app/index.html" ]; then
            cp .next/server/app/index.html out/index.html
          fi
          
          echo "Export completed. Contents:"
          ls -la out/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
