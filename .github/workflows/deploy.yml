name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Show Next.js config
        run: |
          echo "=== Next.js Configuration ==="
          cat next.config.ts
          echo ""
          echo "=== Package.json scripts ==="
          cat package.json | grep -A 5 '"scripts"'

      - name: Build with Next.js
        run: |
          echo "Starting Next.js build..."
          echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}"
          npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Verify build output
        run: |
          echo "=== Checking build output ==="
          echo "Current directory contents:"
          ls -la
          echo ""
          if [ -d "out" ]; then
            echo "✓ out directory exists"
            echo "Contents of out directory:"
            ls -la out/
            echo ""
            echo "First level subdirectories:"
            find out -maxdepth 1 -type d
          else
            echo "✗ out directory not found!"
            echo ""
            echo "Checking for .next directory:"
            if [ -d ".next" ]; then
              echo "✓ .next directory exists"
              ls -la .next/
            else
              echo "✗ .next directory not found either"
            fi
            echo ""
            echo "All directories in current path:"
            find . -maxdepth 2 -type d
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

